<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSEE: Arquitectura Lógica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { amber: { 300: '#fcd34d', 400: '#fbbf24', 500: '#f59e0b', 950: '#451a03' } },
                    fontFamily: { mono: ['Share Tech Mono', 'monospace'], serif: ['Cinzel', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        };
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Cinzel', serif;
        }

        .font-mono {
            font-family: 'Share Tech Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #57534e;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a29e;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        canvas {
            touch-action: none;
        }
    </style>
</head>

<body
    class="bg-stone-50 text-stone-900 transition-colors duration-300 dark:bg-black dark:text-stone-200 overflow-hidden h-screen flex flex-col">

    <header
        class="bg-white dark:bg-stone-900 border-b border-stone-200 dark:border-stone-800 h-12 flex-shrink-0 flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-3">
            <!-- MOBILE MENU BUTTON (NOW GLOBAL) -->
            <button
                onclick="document.getElementById('main-sidebar').classList.toggle('w-0'); document.getElementById('main-sidebar').classList.toggle('w-64')"
                class="text-stone-400 hover:text-amber-500 mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <img src="ssee_logo_compendio.jpg"
                class="h-10 w-10 rounded-full border border-amber-500/50 object-cover shadow-[0_0_10px_rgba(245,158,11,0.3)]"
                alt="SSEE Emblem">
            <h1 class="text-xl font-bold font-serif tracking-widest text-stone-200 uppercase hidden md:block">SSEE:
                SISTEMA DE
                UNIFICACIÓN
            </h1>
            <h1 class="text-lg font-bold font-serif tracking-widest text-stone-200 uppercase md:hidden">SSEE</h1>
        </div>
        <!-- TOP NAV REMOVED (Conflicting/Redundant) -->
        <div class="hidden" id="nav-container"></div>
        <div>
            <button id="audio-btn" onclick="toggleAudio()"
                class="text-stone-400 hover:text-green-500 transition-colors mr-2" title="Activar Ambiente SSEE">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                </svg>
            </button>
            <button onclick="toggleTheme()" class="text-stone-400 hover:text-amber-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            </button>
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden relative">
        <nav id="main-sidebar"
            onmouseleave="document.getElementById('main-sidebar').classList.add('w-0'); document.getElementById('main-sidebar').classList.remove('w-64')"
            class="absolute md:relative h-full z-40 w-0 overflow-hidden bg-stone-100 dark:bg-stone-950/95 md:dark:bg-stone-950/50 border-r border-stone-200 dark:border-stone-800 flex flex-col py-4 flex-shrink-0 transition-all duration-300 group shadow-2xl md:shadow-none">
            <div class="flex-grow space-y-1 px-2" id="sidebar-container"></div>
            <div
                class="px-4 text-[10px] text-stone-400 font-mono text-center opacity-0 md:opacity-100 group-hover:opacity-100 transition-opacity">
                V. 5.12.0<br>NÚCLEO ACTIVO</div>
        </nav>
        <main id="content-area" class="flex-grow p-0 overflow-hidden relative bg-black overflow-y-auto"></main>
    </div>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            load(state.active);
        }

        const SSEE = {
            C: {
                PHI: 1.618033988749895, PI: 3.141592653589793,
                get BIAL() { return (this.PHI + this.PI) / 2; },
                get OMEGA() { return this.OMEGA_DNAV; },
                OMEGA_DNAV: 4.759626642, /* CORRECCIÓN VITAL SSEE */
                get KAL() { return this.BIAL + this.PI; },
                get SOLAR() { return this.BIAL + this.KAL; },
                get MAR() { return this.OMEGA_DNAV + this.PI; },
                get VITA() { return this.PI + this.KAL; },
                get ANMA() { return this.BIAL + this.VITA; },
                get IGNIS() { return this.PI + (this.OMEGA_DNAV + this.PHI); },
                get KRYSTOS() { return this.PHI + this.PI + this.OMEGA_DNAV; },
                get PHITA() { return 10.281; },
                get PYROS() { return this.OMEGA_DNAV + this.PHI; },
                get MIKA() { return this.KRYSTOS + this.PHI; },
                get AURA() { return this.PHI + this.BIAL; },
                get MIRA() { return this.AURA / 2; },
                get TRIAL() { return this.AURA * 3; },
                get DUAL() { return this.AURA * 2; },
                get MIKAEL_V() { return this.PHI + this.PI + this.KRYSTOS; },
                get BUFFER() { return this.MIKAEL_V - this.TRIAL; }
            },
            getDisclaimer: function () {
                return `<div class="mt-2 p-2 bg-amber-50 dark:bg-amber-900/20 border-l-4 border-amber-500 text-[10px] md:text-xs text-amber-800 dark:text-amber-200 italic rounded-r">
                            ⚠️ <strong>Interpretación alternativa:</strong> La explicación mediante "KAL" es una hipótesis no estándar.
                        </div>`;
            }
        };

        const TOP_SECTIONS = [
            { id: 'res1', label: 'I. Cosmología', icon: '🌌' }, { id: 'res2', label: 'II. Partículas', icon: '⚛️' },
            { id: 'res3', label: 'III. Óptica', icon: '👁️' }, { id: 'res4', label: 'IV. Química', icon: '⚗️' },
            { id: 'res5', label: 'V. Medicina', icon: '⚕️' }, { id: 'res6', label: 'VI. Filosofía', icon: '📜' },
            { id: 'res7', label: 'VII. Paz', icon: '🕊️' }, { id: 'res8', label: 'VIII. Octava Materia', icon: '💎' }
        ];

        const SIDE_SECTIONS = [
            { id: 'dash', label: 'Dashboard', icon: '⚡' }, { id: 'sim', label: 'Simulador Python', icon: '🐍' },
            { id: 'irreg', label: 'Irregulares SSEE', icon: '🌀', special: true }, { id: 'ygg', label: 'YGG', icon: '🌱' }
        ];

        let state = { active: 'dash', charts: {}, atomAnim: null, atomSpeed: 1, atomZoom: 1, atomElement: { z: 2, s: 'He', n: 'Helio' }, activeAnim: null };

        const ATOMS = [
            "H:Hidrógeno", "He:Helio", "Li:Litio", "Be:Berilio", "B:Boro", "C:Carbono", "N:Nitrógeno", "O:Oxígeno", "F:Flúor", "Ne:Neón",
            "Na:Sodio", "Mg:Magnesio", "Al:Aluminio", "Si:Silicio", "P:Fósforo", "S:Azufre", "Cl:Cloro", "Ar:Argón", "K:Potasio", "Ca:Calcio",
            "Sc:Escandio", "Ti:Titanio", "V:Vanadio", "Cr:Cromo", "Mn:Manganeso", "Fe:Hierro", "Co:Cobalto", "Ni:Níquel", "Cu:Cobre", "Zn:Zinc",
            "Ga:Galio", "Ge:Germanio", "As:Arsénico", "Se:Selenio", "Br:Bromo", "Kr:Criptón", "Rb:Rubidio", "Sr:Estroncio", "Y:Itrio", "Zr:Circonio",
            "Nb:Niobio", "Mo:Molibdeno", "Tc:Tecnecio", "Ru:Rutenio", "Rh:Rodio", "Pd:Paladio", "Ag:Plata", "Cd:Cadmio", "In:Indio", "Sn:Estaño",
            "Sb:Antimonio", "Te:Telurio", "I:Yodo", "Xe:Xenón", "Cs:Cesio", "Ba:Bario", "La:Lantano", "Ce:Cerio", "Pr:Praseodimio", "Nd:Neodimio",
            "Pm:Prometio", "Sm:Samario", "Eu:Europio", "Gd:Gadolinio", "Tb:Terbio", "Dy:Disprosio", "Ho:Holmio", "Er:Erbio", "Tm:Tulio", "Yb:Iterbio",
            "Lu:Lutecio", "Hf:Hafnio", "Ta:Tántalo", "W:Tungsteno", "Re:Renio", "Os:Osmio", "Ir:Iridio", "Pt:Platino", "Au:Oro", "Hg:Mercurio",
            "Tl:Talio", "Pb:Plomo", "Bi:Bismuto", "Po:Polonio", "At:Astato", "Rn:Radón", "Fr:Francio", "Ra:Radio", "Ac:Actinio", "Th:Torio",
            "Pa:Protactinio", "U:Uranio", "Np:Neptunio", "Pu:Plutonio", "Am:Americio", "Cm:Curio", "Bk:Berkelio", "Cf:Californio", "Es:Einstenio", "Fm:Fermio"
        ];


        // NEW: SPLIT LAYOUT GENERATOR

        let currentRegIndex = 0;

        function updateRegisterCard() {
            const reg = IRREG_DATA[currentRegIndex];
            const el = document.getElementById('register-content');
            if (!el || !reg) return;

            // SPECIAL YGG LAYOUT (For registers with detailed steps)
            if (reg.steps) {
                // Render steps as table rows
                const stepsHtml = reg.steps.map(s => `
                    <div class="flex justify-between py-1 border-b border-stone-800">
                        <span class="text-stone-400 font-mono text-[10px]">${s.op ? s.op + ' =' : ''}</span>
                        <div class="flex gap-2">
                            <span class="text-stone-500 font-mono text-[10px] uppercase">${s.name}</span>
                            <span class="font-bold font-mono text-xs ${reg.c}">${typeof s.val === 'number' ? fmtIrreg(s.val) : s.val}</span>
                        </div>
                    </div>
                `).join('');

                el.innerHTML = `
                    <div class="h-full overflow-y-auto custom-scroll p-4">
                        <div class="border-l-2 border-amber-500 pl-4 mb-4">
                            <div class="text-[10px] font-bold text-stone-500 uppercase tracking-widest">${reg.id}</div>
                            <h2 class="text-2xl font-bold ${reg.c} font-serif">${reg.l}</h2>
                            <div class="text-xs text-stone-400">${reg.f}</div>
                        </div>

                        <div class="mb-4">
                            <div class="text-[10px] font-bold text-stone-300 mb-2 uppercase tracking-wider">Secuencia Lógica</div>
                            <div class="bg-stone-900/50 p-3 rounded border border-stone-800">
                                ${stepsHtml}
                            </div>
                        </div>

                        <div class="flex justify-between items-center bg-black/40 p-3 rounded border border-amber-500/20">
                            <span class="text-amber-600 text-[10px] font-bold uppercase">Ygg Value</span>
                            <span class="text-xl font-bold text-white font-mono">${fmtIrreg(reg.v)}</span>
                        </div>
                    </div>
                `;
            }
            // STANDARD LAYOUT (Legacy)
            else {
                el.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="text-[10px] font-bold text-stone-500 uppercase tracking-widest mb-1">REGISTER_ID: ${reg.id}</div>
                                <h2 class="text-3xl font-bold ${reg.c} font-serif">${reg.l}</h2>
                                <div class="font-mono text-xs text-stone-400 mt-1">${reg.f}</div>
                            </div>
                            <div class="text-right">
                                 <div class="text-2xl font-bold text-white font-mono">${fmtIrreg(reg.v)}</div>
                                 <div class="text-[10px] text-stone-600">SSEE_VALUE</div>
                            </div>
                        </div>
                        
                        <div class="bg-black/30 p-3 rounded border border-stone-800 mb-4 backdrop-blur-md">
                            <div class="text-[10px] text-stone-500 mb-1">EQUATION SIGIL</div>
                            <div class="font-mono text-sm text-amber-500">${reg.eq}</div>
                        </div>

                        <div class="flex gap-2 text-[10px] font-mono text-stone-500">
                            <span class="px-2 py-1 bg-stone-800 rounded border border-stone-700">P-${reg.p}</span>
                            <span class="px-2 py-1 bg-stone-800 rounded border border-stone-700">${reg.s}</span>
                            <span class="px-2 py-1 bg-stone-800 rounded border border-stone-700 uppercase">${reg.geom.type}</span>
                        </div>
                    </div>
                `;
            }

            // UPDATE TERMINAL
            const term = document.getElementById('terminal-output');
            if (term) {
                const line = document.createElement('div');
                line.innerHTML = `<span class="text-stone-500">[${new Date().toLocaleTimeString()}]</span> READ >> <span class="${reg.c}">${reg.id}</span> :: VAL:${reg.v} // ${reg.f}`;
                line.className = "mb-1 border-l-2 border-stone-700 pl-2";
                term.appendChild(line);
                term.scrollTop = term.scrollHeight;

                // Limit history
                if (term.childElementCount > 20) term.removeChild(term.firstChild);
            }
        }



        function init() { renderNav(); load('dash'); } // DEFAULT TO DASHBOARD

        function renderNav() {
            const top = document.getElementById('nav-container'); if (top) top.innerHTML = TOP_SECTIONS.map(s =>
                `<button onclick="load('${s.id}')" class="px-3 py-2 text-xs md:text-sm font-bold rounded-t-lg transition-all flex items-center gap-2 whitespace-nowrap ${state.active === s.id ? 'bg-white text-stone-900 border-t-2 border-amber-500 shadow-md dark:bg-stone-800 dark:text-white dark:border-amber-500' : 'text-stone-500 hover:text-stone-700 hover:bg-stone-100 dark:text-stone-400 dark:hover:text-stone-200 dark:hover:bg-stone-800'}"><span>${s.icon}</span> ${s.label}</button>`).join('');

            // COMBINED SIDEBAR FOR MOBILE (Top + Side sections)
            const allSections = [...TOP_SECTIONS, { sep: true }, ...SIDE_SECTIONS];

            const side = document.getElementById('sidebar-container'); if (side) side.innerHTML = allSections.map(s => {
                if (s.sep) return '<div class="h-px bg-stone-200 dark:bg-stone-800 my-2 mx-4"></div>';
                return `<button onclick="load('${s.id}'); if(window.innerWidth < 768) { document.getElementById('main-sidebar').classList.add('w-0'); document.getElementById('main-sidebar').classList.remove('w-64'); }" class="flex items-center gap-4 p-2 rounded-xl transition-all w-full overflow-hidden group-hover:bg-white/5 dark:group-hover:bg-stone-800/50 ${state.active === s.id ? 'text-amber-500 bg-amber-500/10' : 'text-stone-400 hover:text-amber-400 hover:bg-stone-100 dark:hover:bg-stone-800'}"><div class="min-w-[2rem] text-center text-2xl">${s.icon}</div><span class="font-bold text-base tracking-wide whitespace-nowrap">${s.label}</span></button>`;
            }).join('');
        }

        function load(id) {
            state.active = id; renderNav();
            cancelAnimationFrame(state.atomAnim); cancelAnimationFrame(state.activeAnim);
            Object.values(state.charts).forEach(c => c && c.destroy()); state.charts = {};
            const el = document.getElementById('content-area'); el.innerHTML = ''; el.classList.remove('fade-in'); void el.offsetWidth;
            setTimeout(() => {
                let html = '';
                if (id === 'dash') html = genDash();
                else if (id === 'sim') html = genSim();
                else if (id === 'ygg') html = genYgg();
                else html = genRes(id);
                el.innerHTML = html; el.classList.add('fade-in');
                if (id === 'sim') runPythonSim();
                // if (id === 'ygg') initBiosEngine(); // AUTO-CALLED FROM genYgg()
                // if (id === 'split') initSplitView(); REMOVED
                if (id === 'res2') initAtomViz();
                if (id === 'res4') initChemViz();
                if (id === 'res5') initMedViz();
                if (id === 'res6') initPhilViz();
                if (id === 'irreg') initIrregViz();
                if (id === 'ygg') initBiosEngine();
                if (id.startsWith('res') && id !== 'res4' && id !== 'res5' && id !== 'res6') initChart(id);
            }, 50);
        }

        function genDash() {
            const C = SSEE.C;
            return `<div class="space-y-8">
                <div class="bg-white dark:bg-stone-900 p-8 rounded-xl shadow-sm border border-stone-200 dark:border-stone-800 relative overflow-hidden transition-colors">
                    <div class="relative z-10">
                        <h2 class="text-3xl lg:text-4xl font-bold text-stone-900 dark:text-white mb-2 font-serif">Registro Maestro de Unificación</h2>
                        
                        <div class="mt-4 p-4 bg-stone-50 dark:bg-stone-950/50 rounded-lg border-l-4 border-amber-500 max-w-4xl backdrop-blur-sm">
                             <div class="flex items-center gap-2 mb-2">
                                <span class="text-lg">🏳️</span>
                                <h3 class="text-xs font-bold text-amber-600 dark:text-amber-500 uppercase tracking-widest">MANIFIESTO SSEE: BANDERA BLANCA</h3>
                             </div>
                             <p class="text-stone-600 dark:text-stone-300 text-xs md:text-sm leading-relaxed italic text-justify">
                                "No venimos a invalidar la ciencia, sino a expandir sus fronteras. La ciencia estándar observa los efectos (Hardware); SSEE mapea el Código Fuente (Software).
                                La Paz real nace de la armonía entre el Caos y el Orden; usamos la lógica no para destruir lo abstracto, sino para filtrarlo.
                                Caminamos con bandera blanca en busca de conocimiento, definiendo la gravedad no solo como curvatura, sino como la presión de la Intención (PHI) condensando la Luz (PI)."
                             </p>
                        </div>

                    </div>
                    <div class="absolute right-0 top-0 h-full w-1/3 bg-gradient-to-l from-stone-50 to-transparent dark:from-stone-950 pointer-events-none"></div>
                </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        ${kpi('PHI (Intención)', C.PHI, 'text-sky-700 dark:text-sky-400', 'border-sky-500', 'Sombra Base')}
                        ${kpi('PI (Estructura)', C.PI, 'text-stone-800 dark:text-stone-200', 'border-stone-400', 'Luz Lógica')}
                        ${kpi('BIAL (Pulso)', C.BIAL, 'text-rose-600 dark:text-rose-400', 'border-rose-500', 'Fricción Vital')}
                        ${kpi('MIKÆL-V (Soberanía)', C.MIKAEL_V, 'text-purple-700 dark:text-purple-400', 'border-purple-500', 'Integración 5D')}
                        ${kpi('ΩDNAV (Estabilidad)', C.OMEGA_DNAV, 'text-amber-600 dark:text-amber-400', 'border-amber-400', 'Sustento Base')}
                        ${kpi('KAL (Retención)', C.KAL, 'text-fuchsia-600 dark:text-fuchsia-400', 'border-fuchsia-400', 'Anclaje Local')}
                        ${kpi('VITA (Biometría)', C.VITA, 'text-emerald-600 dark:text-emerald-400', 'border-emerald-500', 'Salud Matemática')}
                        ${kpi('TRIAL (Materia)', C.TRIAL, 'text-stone-500 dark:text-stone-400', 'border-stone-300', 'Límite 3D')}
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 bg-stone-900 dark:bg-black text-white p-8 rounded-xl flex flex-col justify-center items-center shadow-lg">
                            <h3 class="text-stone-400 text-xs tracking-[0.3em] font-mono mb-6">AXIOMA DE SINGULARIDAD</h3>
                            <div class="font-mono text-2xl md:text-4xl font-bold text-center mb-6">-∞ = -1 = 0.1 = 1 = +∞</div>
                            <div class="text-[10px] md:text-xs font-mono text-stone-500 tracking-[0.2em] uppercase flex items-center gap-4 select-none">
                                <span>Vacío</span> <span class="text-amber-500/50">→</span> 
                                <span>Sombra</span> <span class="text-amber-500/50">→</span> 
                                <span>Frecuencia</span> <span class="text-amber-500/50">→</span> 
                                <span class="text-white font-bold">Luz</span>
                            </div>
                        </div>
                        <div class="bg-amber-50 dark:bg-amber-950/30 p-8 rounded-xl border border-amber-100 dark:border-amber-900/50"><h4 class="font-bold text-amber-800 dark:text-amber-500 mb-4 tracking-tight">Estado</h4><ul class="space-y-3 text-sm font-mono text-amber-900/70"><li class="flex justify-between border-b border-amber-200 dark:border-amber-800 pb-2"><span>PRECISIÓN</span> <strong>p-12</strong></li><li class="flex justify-between border-b border-amber-200 dark:border-amber-800 pb-2"><span>NÚCLEO</span> <strong>SELLADO</strong></li></ul></div>
                    </div></div>`;
        }
        function kpi(l, v, c, b, s) { return `<div class="metric-card bg-white dark:bg-stone-900 p-5 rounded-lg border-l-4 ${b} shadow-sm"><span class="text-xs font-bold text-stone-400 uppercase">${l}</span><div class="font-mono text-2xl font-bold mt-2 ${c} truncate">${fmtIrreg(v)}</div><div class="text-[10px] text-stone-400 uppercase">${s}</div></div>`; }

        function genYgg() {
            // Load Three.js scripts
            const scripts = [
                'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
                'https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js',
                'https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js',
                'https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js',
                'https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js',
                'https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js',
                'https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js',
                'https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js'
            ];

            function loadScript(url) {
                return new Promise((resolve, reject) => {

        function initPhilViz() {
            let vizState = { mode: 2, selected: null }; // 2=2D, 3=3D, 4=4D, 5=YGG
            const canvas = document.getElementById('chartPhil'); // Changed from 'vizCanvas' to 'chartPhil' to match existing HTML
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const parent = canvas.parentElement;
            let time = 0;
            let activeAnim = null;
            let tick = 0; // Added tick variable
            let rot = { x: 0, y: 0 }; // Added rot variable
            let drag = false; // Added drag variable

            window.toggleVizMode = () => {
                if (vizState.mode === 5) vizState.mode = 2; // Exit Ygg to 2D
                else {
                    vizState.mode++;
                    if (vizState.mode > 4) vizState.mode = 2;
                }
            };

            window.setYggMode = () => {
                vizState.mode = 5;
            };

            function draw() {
                if (state.active !== 'res6') {
                    if (activeAnim) cancelAnimationFrame(activeAnim);
                    return;
                }

                if (canvas.width !== parent.clientWidth || canvas.height !== parent.clientHeight) {
                    canvas.width = parent.clientWidth;
                    canvas.height = parent.clientHeight;
                }

                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;

                ctx.fillStyle = '#0c0a09';
                ctx.fillRect(0, 0, w, h);

                time += 0.005;

                // --- 1. THE SINGULARITY (0.1) ---
                const singX = cx;
                const singY = h * 0.85;

                ctx.save();
                ctx.translate(singX, singY);

                // Root (0.1 to 1D)
                ctx.strokeStyle = '#6366f1';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                const splitY = -h * 0.45;
                ctx.lineTo(0, splitY);
                ctx.stroke();

                // Nodes
                const nodes = [0.1, 0.3, 0.6, 0.9];
                nodes.forEach((n, i) => {
                    const ny = splitY * n;
                    ctx.fillStyle = i % 2 === 0 ? '#fff' : '#818cf8';
                    ctx.beginPath();
                    ctx.arc(0, ny, 3, 0, Math.PI * 2);
                    ctx.fill();
                    if (n > 0.8) {
                        ctx.fillStyle = 'rgba(255,255,255,0.5)';
                        ctx.textAlign = 'right';
                        ctx.font = '10px monospace';
                        ctx.fillText(`14D`, -10, ny);
                    }
                });

                // --- 2. THE SPLIT (45D) ---
                // Left
                ctx.beginPath();
                ctx.moveTo(0, splitY);
                ctx.quadraticCurveTo(-w * 0.1, splitY - h * 0.2, -w * 0.35, -h * 0.7);
                const gradL = ctx.createLinearGradient(0, splitY, -w * 0.35, -h * 0.7);
                gradL.addColorStop(0, '#6366f1'); gradL.addColorStop(1, '#ec4899');
                ctx.strokeStyle = gradL; ctx.stroke();

                // Right
                ctx.beginPath();
                ctx.moveTo(0, splitY);
                ctx.quadraticCurveTo(w * 0.1, splitY - h * 0.2, w * 0.35, -h * 0.7);
                const gradR = ctx.createLinearGradient(0, splitY, w * 0.35, -h * 0.7);
                gradR.addColorStop(0, '#6366f1'); gradR.addColorStop(1, '#0ea5e9');
                ctx.strokeStyle = gradR; ctx.stroke();

                // Gap Particles
                const gapCount = 40;
                for (let i = 0; i < gapCount; i++) {
                    const offset = (i * 13.5 + time * 50) % (h * 0.6);
                    const spread = Math.sin(time + i) * (w * 0.15);
                    const py = splitY - offset;
                    const px = spread * (Math.sin(i * 0.5 + time) * 0.8); // Mutually observing
                    const alpha = 1 - (offset / (h * 0.6));
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.6})`;
                    ctx.beginPath(); ctx.arc(px, py, 1.2, 0, Math.PI * 2); ctx.fill();
                }

                ctx.restore();

                // Text
                ctx.font = 'bold 12px monospace'; ctx.fillStyle = '#a8a29e'; ctx.textAlign = 'center';
                ctx.fillText('0.1 AXIOM', cx, singY + 20);

                ctx.font = '10px monospace'; ctx.fillStyle = '#6366f1';
                ctx.fillText('45D BIFURCATION', cx, singY + splitY - 10);

                ctx.fillStyle = `rgba(255, 255, 255, ${0.7 + Math.sin(time * 2) * 0.3})`;
                ctx.font = 'bold 16px serif';
                ctx.fillText('MÏŒSLÅNKH', cx, singY + splitY * 1.55); // Floating in the gap

                activeAnim = requestAnimationFrame(draw);
            }
            draw();
        }

        // ATOM VIZ
        function initAtomViz() {
            const canvas = document.getElementById('atomCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const parent = canvas.parentElement;

            // MOBILE CHECK
            const isMobile = window.innerWidth < 768;

            let view = { x: 0, y: 0, dragging: false, lastX: 0, lastY: 0 };
            canvas.style.cursor = 'grab';

            // CLEANUP PREVIOUS EVENT LISTENERS (CRITICAL FIX)
            if (state.atomHandlers) {
                window.removeEventListener('mousemove', state.atomHandlers.onMove);
                window.removeEventListener('mouseup', state.atomHandlers.onUp);
                window.removeEventListener('touchmove', state.atomHandlers.onTouchMove);
                window.removeEventListener('touchend', state.atomHandlers.onUp);
                window.removeEventListener('resize', state.atomHandlers.onResize);
                document.removeEventListener('fullscreenchange', state.atomHandlers.onResize);
            }

            // HANDLERS
            const onDown = (x, y) => { view.dragging = true; view.lastX = x; view.lastY = y; canvas.style.cursor = 'grabbing'; };
            const onMove = (e) => {
                if (!view.dragging) return;
                const x = e.clientX; const y = e.clientY;
                const dx = x - view.lastX; const dy = y - view.lastY;
                view.x += dx * 0.01; view.y += dy * 0.01;
                view.lastX = x; view.lastY = y;
            };
            const onTouchMove = (e) => {
                if (!view.dragging) return; // Allow scroll if not dragging atom? No, we prevent default to avoid pull-to-refresh
                // Only prevent default if we are dragging inside the canvas context effectively
                // But here we are on window.
                // Let's prevent default ONLY if dragging.
                if (view.dragging) e.preventDefault();

                const x = e.touches[0].clientX; const y = e.touches[0].clientY;
                const dx = x - view.lastX; const dy = y - view.lastY;
                view.x += dx * 0.01; view.y += dy * 0.01;
                view.lastX = x; view.lastY = y;
            };
            const onUp = () => { view.dragging = false; canvas.style.cursor = 'grab'; };

            // RESIZE HANDLER
            const onResize = () => {
                if (!canvas || !parent) return;
                canvas.width = parent.clientWidth;
                canvas.height = parent.clientHeight;
            };

            // STORE HANDLERS IN STATE
            state.atomHandlers = { onMove, onUp, onTouchMove, onResize };

            // ATTACH LISTENERS
            canvas.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
            canvas.addEventListener('touchstart', e => onDown(e.touches[0].clientX, e.touches[0].clientY), { passive: false });
            canvas.addEventListener('wheel', e => { e.preventDefault(); adjustAtomZoom(e.deltaY > 0 ? -0.1 : 0.1); }, { passive: false });

            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onUp);
            window.addEventListener('resize', onResize);
            document.addEventListener('fullscreenchange', onResize);

            onResize(); // Initial size

            let time = 0;
            const Z = state.atomElement.z;
            const N = (Z === 1) ? 0 : Math.round(Z * (Z < 20 ? 1 : 1.5));
            const baseScale = Z > 10 ? (Z > 50 ? 0.4 : 0.7) : 1;

            const nucleusParticles = [];
            // OPTIMIZE FOR MOBILE
            const pCount = isMobile ? Math.min(Z + N, 20) : (Z + N);
            for (let i = 0; i < pCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = Math.cbrt(Math.random()) * (Z * 1.2);
                nucleusParticles.push({ type: i < Z ? 'p' : 'n', x: r * Math.sin(phi) * Math.cos(theta), y: r * Math.sin(phi) * Math.sin(theta), z: r * Math.cos(phi) });
            }
            const shells = [];
            let electronsLeft = Z, shellCap = 2, shellIdx = 0;
            while (electronsLeft > 0) {
                const count = Math.min(electronsLeft, shellCap);
                const rCount = isMobile ? Math.min(count, 5) : count;
                shells.push({ count: rCount, r: 60 + (shellIdx * 35), tiltX: Math.random() * Math.PI, tiltZ: Math.random() * Math.PI });
                electronsLeft -= count;
                shellIdx++;
                if (shellIdx === 1) shellCap = 8; else if (shellIdx === 2) shellCap = 8; else if (shellIdx === 3) shellCap = 18; else shellCap = 32;
            }

            function rotate3D(x, y, z, rx, ry) {
                let x1 = x * Math.cos(rx) - z * Math.sin(rx);
                let z1 = x * Math.sin(rx) + z * Math.cos(rx);
                let y2 = y * Math.cos(ry) - z1 * Math.sin(ry);
                let z2 = y * Math.sin(ry) + z1 * Math.cos(ry);
                return { x: x1, y: y2, z: z2 };
            }

            let photons = [];

            // OPTIMIZED RESIZE HANDLER (Prevent Layout Thrashing)
            const handleResize = () => {
                if (!canvas || !parent) return;
                canvas.width = parent.clientWidth;
                canvas.height = parent.clientHeight;
            };
            window.removeEventListener('resize', state.resizeHandler); // Remove old if exists
            state.resizeHandler = handleResize;
            window.addEventListener('resize', state.resizeHandler);
            handleResize(); // Initial size

            function draw() {
                if (state.active !== 'res2') return;

                // ROBUST RESIZE CHECK (Fix for Fullscreen Race Condition)
                // If the container changed size (e.g. Fullscreen), update canvas immediately
                if (canvas.width !== parent.clientWidth || canvas.height !== parent.clientHeight) {
                    canvas.width = parent.clientWidth;
                    canvas.height = parent.clientHeight;
                }

                if (state.atomElement.z !== Z) { initAtomViz(); return; }

                const cx = canvas.width / 2; const cy = canvas.height / 2;
                const spd = state.atomSpeed || 1;
                time += 0.02 * spd;

                // FONDO
                if (spd > 20) { ctx.fillStyle = 'rgba(15, 15, 16, 0.3)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
                else { ctx.fillStyle = '#0f0f10'; ctx.clearRect(0, 0, canvas.width, canvas.height); } // Removed unnecessary fillRect after clear

                const scale = baseScale * state.atomZoom;
                const renderList = [];
                const globalSpinY = time * 0.05; const globalSpinX = time * 0.02;

                // 1. Photons logic (DISABLED ON MOBILE IN LOOP TO SAVE CYCLE)
                if (!isMobile) {
                    for (let i = photons.length - 1; i >= 0; i--) {
                        let p = photons[i]; p.x += p.vx; p.y += p.vy; p.z += p.vz; p.life -= p.decay;
                        if (p.life <= 0) { photons.splice(i, 1); continue; }
                        let rFinal = rotate3D(p.x, p.y, p.z, view.x + globalSpinY, view.y + globalSpinX);
                        renderList.push({ type: 'photon', x: rFinal.x, y: rFinal.y, z: rFinal.z, sz: 1.5, opacity: p.life, subtype: p.type });
                    }
                }

                // 2. MULTI-ATOM RENDERING LOOP
                // CRITICAL: FORCE SINGLE ATOM ON MOBILE
                const atomCount = isMobile ? 1 : (state.atomCount || 1);
                const temp = state.atomTemp || 1.0;
                const repulsionDist = 120 * temp * (0.8 + Math.sin(time * 0.2) * 0.1);
                const isFast = !isMobile && (spd > 20);

                for (let a = 0; a < atomCount; a++) {
                    let ax = 0, ay = 0, az = 0;
                    if (atomCount >= 2) { // Logic only runs if not mobile
                        if (atomCount === 2) { ax = (a === 0 ? -1 : 1) * repulsionDist * 0.8; }
                        else if (atomCount === 3) { const ang = (Math.PI * 2 * a) / 3; ax = Math.cos(ang) * repulsionDist; ay = Math.sin(ang) * repulsionDist; }
                        else if (atomCount === 4) {
                            const ang = (Math.PI * 2 * a) / 3;
                            if (a < 3) { ax = Math.cos(ang) * repulsionDist; ay = Math.sin(ang) * repulsionDist; az = -repulsionDist * 0.5; }
                            else { az = repulsionDist * 0.5; }
                        }
                        // Dance
                        const danceX = Math.sin(time * 0.5 + a * 1.5) * 5 * temp;
                        const danceY = Math.cos(time * 0.3 + a * 1.5) * 5 * temp;
                        ax += danceX; ay += danceY;
                    }


                    nucleusParticles.forEach(p => {
                        // SIMPLIFY VIBRATION ON MOBILE
                        const vib = isMobile ? 0 : Math.sin(time + p.x) * 0.5 * temp;
                        const lx = p.x + vib, ly = p.y + vib, lz = p.z + vib;
                        const wx = lx + ax, wy = ly + ay, wz = lz + az;

                        const r = rotate3D(wx, wy, wz, view.x + globalSpinY, view.y + globalSpinX);
                        renderList.push({ type: 'nucleus', subtype: p.type, x: r.x, y: r.y, z: r.z, sz: 8 });

                        // DISABLE PHOTON GENERATION ON MOBILE TO REDUCE LOAD
                        if (!isMobile && Math.random() < 0.02 * temp) {
                            const theta = Math.random() * Math.PI * 2; const phi = Math.acos(2 * Math.random() - 1); const speed = (1 + Math.random()) * temp;
                            photons.push({
                                type: p.type, x: wx, y: wy, z: wz,
                                vx: speed * Math.sin(phi) * Math.cos(theta), vy: speed * Math.sin(phi) * Math.sin(theta), vz: speed * Math.cos(phi),
                                life: 1.0, decay: 0.02
                            });
                        }
                    });

                    shells.forEach((shell, sIdx) => {
                        // LIMIT SHELLS ON MOBILE
                        if (isMobile && sIdx > 1) return;

                        const radius = shell.r; const speed = (1 - (sIdx * 0.1)) * 0.5 * temp * (spd < 20 ? spd : 20);
                        for (let i = 0; i < shell.count; i++) {
                            const theta = (time * speed) + (i * (Math.PI * 2) / shell.count);
                            let ex = radius * Math.cos(theta), ey = radius * Math.sin(theta), ez = 0;
                            let r1 = rotate3D(ex, ey, ez, shell.tiltX, shell.tiltZ);
                            const wx = r1.x + ax, wy = r1.y + ay, wz = r1.z + az;

                            let rFinal = rotate3D(wx, wy, wz, view.x + globalSpinY, view.y + globalSpinX);
                            renderList.push({ type: 'electron', x: rFinal.x, y: rFinal.y, z: rFinal.z, sz: 4, trail: isFast });

                            if (!isMobile && Math.random() < 0.03 * temp) {
                                const phi = Math.acos(2 * Math.random() - 1); const th = Math.random() * Math.PI * 2; const sp = (3 + Math.random()) * temp;
                                photons.push({ type: 'e', x: wx, y: wy, z: wz, vx: sp * Math.sin(phi) * Math.cos(th), vy: sp * Math.sin(phi) * Math.sin(th), vz: sp * Math.cos(phi), life: 0.6, decay: 0.04 });
                            }
                        }
                    });
                }

                renderList.sort((a, b) => a.z - b.z);

                renderList.forEach(p => {
                    const perspective = 800; const pFactor = perspective / (perspective - p.z);
                    if (perspective - p.z < 10) return;
                    const sx = cx + p.x * pFactor * scale; const sy = cy + p.y * pFactor * scale;

                        else { ctx.fillStyle = `rgba(96, 165, 250, ${p.opacity})`; if (!isMobile) ctx.shadowColor = ctx.fillStyle; }
                    }
                    else if (p.type === 'nucleus') {
                        if (isMobile) {
                            if (p.subtype === 'p') ctx.fillStyle = '#e11d48';
                            else ctx.fillStyle = '#fbbf24';
                        } else {
                            if (p.subtype === 'p') {

                                grad.addColorStop(0, '#881337'); grad.addColorStop(0.6, '#be123c'); grad.addColorStop(1, '#e11d48');
                                ctx.fillStyle = grad; ctx.shadowBlur = 4 * pFactor; ctx.shadowColor = '#881337';
                            } else {
                                const grad = ctx.createRadialGradient(sx, sy, size * 0.1, sx, sy, size);
                                grad.addColorStop(0, '#ffffeb'); grad.addColorStop(0.4, '#fde047'); grad.addColorStop(1, '#fbbf24');
                                ctx.fillStyle = grad; ctx.shadowBlur = 40 * pFactor * (isFast ? 0.3 : 1); ctx.shadowColor = '#fbbf24';
                            }

                    } else if (p.type === 'electron') {

                            ctx.fillStyle = '#2563eb';

                            const grad = ctx.createRadialGradient(sx, sy, size * 0.05, sx, sy, size);

                            ctx.fillStyle = grad; ctx.shadowBlur = 25 * pFactor; ctx.shadowColor = '#60a5fa';
                        }
                    }
                    ctx.fill(); ctx.shadowBlur = 0;
                });

                state.atomAnim = requestAnimationFrame(draw);
            }
            draw();
        }

        function initChemViz() {
            const canvas = document.getElementById('chemCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const parent = canvas.parentElement;

            let time = 0;
            let particles = [];
            // Init particles
            for (let i = 0; i < 50; i++) particles.push({
                x: Math.random(), y: Math.random(),
                vx: (Math.random() - 0.5) * 0.01, vy: (Math.random() - 0.5) * 0.01,
                life: Math.random(), type: Math.random() > 0.5 ? 'fire' : 'ice'
            });

            function draw() {
                if (state.active !== 'res4') return;

                if (canvas.width !== parent.clientWidth || canvas.height !== parent.clientHeight) {
                    canvas.width = parent.clientWidth;
                    canvas.height = parent.clientHeight;
                }

                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;

                time += 0.02;

                // Clear
                ctx.fillStyle = '#0c0a09';
                ctx.fillRect(0, 0, w, h);

                // --- IGNIS (Left, Red, Chaos) ---
                const ignisX = cx - w * 0.22;
                const ignisY = cy;

                // Pulsing Core IGNIS
                const pulseI = Math.sin(time * 3) * 5 + 40;
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#f43f5e';
                ctx.beginPath();
                ctx.arc(ignisX, ignisY, pulseI, 0, Math.PI * 2);
                const gradI = ctx.createRadialGradient(ignisX, ignisY, 0, ignisX, ignisY, pulseI);
                gradI.addColorStop(0, '#be123c');
                gradI.addColorStop(1, 'rgba(190, 18, 60, 0)');
                ctx.fillStyle = gradI;
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px monospace';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 0;
                ctx.fillText('IGNIS (Fricción)', ignisX, ignisY + 70);

                // --- KRYSTOS (Right, Blue, Order) ---
                const krysX = cx + w * 0.22;
                const krysY = cy;

                // Crystal Core KRYSTOS
                ctx.save();
                ctx.translate(krysX, krysY);
                ctx.rotate(time * 0.5);
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#0ea5e9';

                // Hexagon/Crystal shape
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    ctx.lineTo(50 * Math.cos(i * Math.PI / 3), 50 * Math.sin(i * Math.PI / 3));
                }
                ctx.closePath();
                ctx.strokeStyle = '#38bdf8';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.fillStyle = 'rgba(14, 165, 233, 0.2)';
                ctx.fill();
                ctx.restore();

                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 0;
                ctx.fillText('KRYSTOS (Orden)', krysX, krysY + 70);

                // --- BOND (Center) ---
                const bondPulse = (Math.sin(time * 5) + 1) * 0.5;
                ctx.beginPath();
                ctx.moveTo(ignisX + pulseI, ignisY);
                ctx.lineTo(krysX - 50, krysY);
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.2 + bondPulse * 0.3})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Central Singularity
                const spark = 10 + Math.random() * 5;

                    const t = (y + time * 50) * freq;

                    // Strand 1
                    const x1 = cx + Math.sin(t) * amp;
                    const z1 = Math.cos(t); // Depth for opacity/size
                    const s1 = 3 + z1; // Size 2 to 4
                    const a1 = 0.5 + z1 * 0.4; // Opacity 0.1 to 0.9

                    // Strand 2 (Offset by PI)
                    const x2 = cx + Math.sin(t + Math.PI) * amp;
                    const z2 = Math.cos(t + Math.PI);
                    const s2 = 3 + z2;
                    const a2 = 0.5 + z2 * 0.4;

                    // Base Pairs (Connecting lines)
                    if (y % 20 === 0) {
                        ctx.beginPath();
                        ctx.moveTo(x1, y);
                        ctx.lineTo(x2, y);
                        ctx.strokeStyle = `rgba(16, 185, 129, ${0.1 + (a1 + a2) / 4})`; // Emerald connection
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }

                    // Draw Molecules
                    // Strand 1 (Emerald - Healthy)
                    ctx.beginPath();
                    ctx.arc(x1, y, s1, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(52, 211, 153, ${a1})`;
                    ctx.fill();

                    // Strand 2 (White/Cyan - Structural)
                    ctx.beginPath();
                    ctx.arc(x2, y, s2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(14, 165, 233, ${a2})`;
                    ctx.fill();
                }

                // --- RESONANCE WAVES (Fractal Antenna) ---
                // Waves radiating from center outwards vertically
                const waveCount = 5;
                const waveSpeed = 0.5;
                for (let i = 0; i < waveCount; i++) {
                    const waveY = ((time * 100 + i * (h / waveCount)) % h);
                    const distFromCenter = Math.abs(cy - waveY);
                    const intensity = 1 - (distFromCenter / (h / 2)); // Stronger at center if we wanted, or just linear

                    ctx.beginPath();
                    ctx.moveTo(0, waveY);
                    ctx.lineTo(w, waveY);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${Math.max(0, intensity * 0.1)})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Label "FREQ MATCH" if near center
                    if (Math.abs(cy - waveY) < 10) {
                        ctx.font = '10px monospace';
                        ctx.fillStyle = '#10b981';
                        ctx.fillText('RESONANCIA 0.333', cx + 100, waveY);
                    }
                }

                // --- INFO FIELD (Floating Particles) ---
                // Red particles representing "Info/Noise" being aligned
                // We'll simulate them gravitating towards the center
                // Ideally we'd need a persistent particle system, but for now let's draw transient ones or reuse a simple math function.

            // GEOMETRY GENERATOR

                    }

                else if (type === 'sphere') {

                        { x: -1, y: -1, z: 1 },        // ICEBERG

                    ];

                    // Rotate the whole system slowly
                    const sysRot = time * 0.2;

                    centers.forEach((c, idx) => {

                        let cx = c.x * Math.cos(sysRot) - c.z * Math.sin(sysRot);

            });
        }

        // --- YGG RENDERING ENGINE ---
        function renderYggTree(ctx, cw, ch, tick, rot) {
            const cx = cw / 2;
            const cy = ch / 2 + 100; // Baja el origen para dejar espacio a las ramas

            // Auto rotate if not dragging
            if (!window.drag) rot.y += 0.003;

            // Trial Value for Reference (The Trunk)
            const trialVal = 11.9935419296;

            // Sort by Value to draw correctly (Painter's algorithm simple)
            const sorted = [...IRREG_DATA].sort((a, b) => a.v - b.v);

            sorted.forEach(node => {
                let x = 0, y = 0, z = 0;
                const v = node.v;
                const p = node.p;

                // --- TREE LOGIC ---
                if (node.id === 'TRIAL') {
                    // TRUNK BASE
                    x = 0; y = 0; z = 0;
                } else if (v < trialVal) {
                    // ROOTS (Below Trial)
                    // Spread based on value difference from Trial
                    const depth = (trialVal - v) * 20;
                    const ang = v * 20 + tick * 0.002; // Geometric distribution
                    const r = depth * 0.5 + (Math.sin(tick * 0.01 + v) * 10);

                    y = depth; // Downwards
                    x = Math.cos(ang) * r;
                    z = Math.sin(ang) * r;
                } else {
                    // BRANCHES (Above Trial)
                    const height = (v - trialVal) * 25;
                    const ang = v * 15 + tick * 0.002;
                    const r = height * 0.8 + (Math.cos(tick * 0.01 + v) * 10);

                    y = -height; // Upwards
                    x = Math.cos(ang) * r;
                    z = Math.sin(ang) * r;
                }

                // 3D Projection
                let x1 = x * Math.cos(rot.y) - z * Math.sin(rot.y);
                let z1 = z * Math.cos(rot.y) + x * Math.sin(rot.y);

                // Perspective
                const scale = 300 / (300 + z1);
                const px = cx + x1 * scale;
                const py = cy + y * scale;

                const alpha = Math.max(0.2, Math.min(1, scale));
                const size = Math.max(2, (p / 2) * scale);

                // Draw Node
                ctx.globalAlpha = alpha;
                ctx.fillStyle = node.geom.color;
                ctx.beginPath();
                ctx.arc(px, py, size, 0, Math.PI * 2);
                ctx.fill();

                // --- HOTSPOTS (INTERACTIVE BUTTONS) ---
                // For Scientific Registers, draw a "Bright Point" halo to make them click targets
                const hotspots = ['PROTON', 'ELECTRON', 'NEUTRO', 'QUARTAL', 'TRIAL', 'BIAL', 'AURA', 'PI', 'PHI'];
                if (hotspots.includes(node.id)) {
                    // Outer Glow
                    const glowSize = size * 2.5; // Bigger hit area visual
                    const grad = ctx.createRadialGradient(px, py, size, px, py, glowSize);
                    grad.addColorStop(0, node.geom.color);
                    grad.addColorStop(1, 'rgba(0,0,0,0)');

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(px, py, glowSize, 0, Math.PI * 2);
                    ctx.fill();

                    // Inner Core (White Hot)
                    ctx.fillStyle = "#ffffff";
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = node.geom.color;
                    ctx.beginPath();
                    ctx.arc(px, py, size * 0.8, 0, Math.PI * 2); // Bright core
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // Label for Hotspot
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 10px monospace";
                    ctx.textAlign = "center";
                    ctx.fillText(node.id, px, py - glowSize - 5);
                }

                // Connect to Trunk (0,0,0 local -> cx, cy screen)
                if (node.id !== 'TRIAL') {
                    const trunkScale = 300 / 300; // z=0
                    const trunkX = cx;
                    const trunkY = cy;

                    ctx.strokeStyle = node.geom.color;
                    ctx.lineWidth = 1 * alpha;
                    ctx.beginPath();
                    ctx.moveTo(trunkX, trunkY);
                    ctx.lineTo(px, py);
                    ctx.stroke();
                }

                // Standard Label (Only vital ones or on hover?)
                if ((scale > 0.8 || node.id === 'TRIAL') && !hotspots.includes(node.id)) {
                    ctx.fillStyle = "#fff";
                    ctx.font = "9px monospace";
                    ctx.textAlign = "left";
                    ctx.fillText(node.s, px + size + 2, py);
                }

                ctx.globalAlpha = 1.0;
            });

            // Draw Trunk Core
            ctx.fillStyle = "#57534e";
            ctx.beginPath();
            ctx.arc(cx, cy, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.textAlign = "center";
            ctx.fillText("TRIAL (Base)", cx, cy + 20);
        }

        // --- AUDIO SYSTEM (PROCEDURAL SSEE DRONE) ---
        let audioCtx = null;
        let masterGain = null;
        let isAudioPlaying = false;

        function toggleAudio() {
            const btn = document.getElementById('audio-btn');
            if (!audioCtx) initAudio();

            if (audioCtx.state === 'suspended') { audioCtx.resume(); }

            if (isAudioPlaying) {
                // FADE OUT
                const now = audioCtx.currentTime;
                masterGain.gain.cancelScheduledValues(now);
                masterGain.gain.setValueAtTime(masterGain.gain.value, now);
                masterGain.gain.linearRampToValueAtTime(0, now + 1.5); // 1.5s fade

                isAudioPlaying = false;
                if (btn) {
                    btn.classList.remove('text-green-500', 'animate-pulse');
                    btn.classList.add('text-stone-400');
                    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" /></svg>`;
                    btn.title = "Activar Ambiente SSEE";
                }
            } else {
                // FADE IN
                audioCtx.resume().then(() => {
                    const now = audioCtx.currentTime;
                    masterGain.gain.cancelScheduledValues(now);
                    masterGain.gain.setValueAtTime(0, now);
                    masterGain.gain.linearRampToValueAtTime(0.3, now + 3.0); // 3s fade in

                    isAudioPlaying = true;
                    // KICKSTART SEQUENCER
                    if (window.sseeAudioScheduler) window.sseeAudioScheduler();

                    if (btn) {
                        btn.classList.remove('text-stone-400');
                        btn.classList.add('text-green-500', 'animate-pulse');
                        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>`;
                        btn.title = "Silenciar Ambiente";
                    }
                });
            }
        }

        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            masterGain.gain.value = 0; // Init muted

            // --- SSEE PIANO ENGINE: MOONLIGHT SONATA ---
            // Procedural sequence of the iconic arpeggios

            const NOTE_LENGTH = 1.6; // Seconds per bar approx (Adagio)
            const TRIPLET = 0.6; // Seconds per triplet note

            // Frequencies
            const N = {
                Cs2: 69.30, B1: 61.74, A1: 55.00, Fs1: 46.25, Gs1: 51.91,
                Gs3: 207.65, Cs4: 277.18, E4: 329.63,
                A3: 220.00, D4: 293.66, Fs4: 369.99,
                B3: 246.94
            };

            // Pattern: [Bass, [Triplet1, Triplet2, Triplet3]]
            // Simple loop of the first 4 measures
            const SEQUENCE = [
                // Measure 1: C#m / Bass C#
                { b: N.Cs2, t: [N.Gs3, N.Cs4, N.E4] },
                { b: N.Cs2, t: [N.Gs3, N.Cs4, N.E4] },
                { b: N.Cs2, t: [N.Gs3, N.Cs4, N.E4] },
                { b: N.Cs2, t: [N.Gs3, N.Cs4, N.E4] },
                // Measure 2: C#m/B / Bass B
                { b: N.B1, t: [N.Gs3, N.Cs4, N.E4] },
                { b: N.B1, t: [N.Gs3, N.Cs4, N.E4] },
                { b: N.B1, t: [N.Gs3, N.Cs4, N.E4] },
                { b: N.B1, t: [N.Gs3, N.Cs4, N.E4] },
                // Measure 3: A / Bass A
                { b: N.A1, t: [N.A3, N.Cs4, N.E4] },
                { b: N.A1, t: [N.A3, N.Cs4, N.E4] },
                { b: N.A1, t: [N.A3, N.Cs4, N.E4] },
                { b: N.A1, t: [N.A3, N.Cs4, N.E4] },
                // Measure 4: F#m / Bass F#
                { b: N.Fs1, t: [N.A3, N.D4, N.Fs4] },
                { b: N.Fs1, t: [N.A3, N.D4, N.Fs4] },
                { b: N.Gs1, t: [N.Gs3, N.Cs4, N.E4] }, // Back to V (G#)
                { b: N.Gs1, t: [N.Gs3, N.Cs4, N.E4] }
            ];

            let noteTime = audioCtx.currentTime + 0.5;
            let currentStep = 0;

            function playPianoNote(freq, time, dur, vol) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                // FM Synthesis for "Piano-like" tone
                // Modulator
                const mod = audioCtx.createOscillator();
                const modGain = audioCtx.createGain();
                mod.frequency.value = freq * 2; // Harmony
                modGain.gain.value = freq * 0.5; // Index
                mod.connect(modGain).connect(osc.frequency);

                osc.frequency.value = freq;
                osc.type = 'sine';

                // Envelope
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(vol, time + 0.05); // Attack
                gain.gain.exponentialRampToValueAtTime(0.01, time + dur); // Decay

                osc.connect(gain).connect(masterGain);

                mod.start(time);
                mod.stop(time + dur);
                osc.start(time);
                osc.stop(time + dur);
            }

            function scheduler() {
                // Schedule notes ahead
                while (noteTime < audioCtx.currentTime + 2.0) {
                    const step = SEQUENCE[currentStep % SEQUENCE.length];

                    // Bass Note (Every 4 "beats" or start of block)
                    // We treat each step as one triplet block (3 notes)
                    playPianoNote(step.b, noteTime, 4.0, 0.15); // Long bass

                    // Triplets
                    playPianoNote(step.t[0], noteTime, 1.5, 0.1);
                    playPianoNote(step.t[1], noteTime + (TRIPLET / 3), 1.5, 0.08);
                    playPianoNote(step.t[2], noteTime + (2 * TRIPLET / 3), 1.5, 0.08);

                    noteTime += TRIPLET;
                    currentStep++;
                }

                // Keep Loop Running
                if (isAudioPlaying) {
                    setTimeout(scheduler, 500);
                }
            }

            // Start the loop logic (it won't actually schedule until isAudioPlaying is true due to the check inside, 
            // but we need to kickstart it when toggle happens.
            // Actually, best to call scheduler() inside toggleAudio or here if we want immediate readiness.
            // Let's attach scheduler hook to the global scope or start it inside toggleAudio.
            window.sseeAudioScheduler = scheduler;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
